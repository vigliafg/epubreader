<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>EPUB Reader (epub.js) - 3 livelli TOC</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column;
    }
    header {
      padding: 10px; background: #1e1e1e; color: white;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    #controls { display: flex; gap: 8px; align-items: center; }
    button { padding: 6px 10px; cursor: pointer; }
    #fontInfo {
      font-size: 12px;
      color: #ccc;
      min-width: 60px;
    }
    #container { flex: 1; display: flex; min-height: 0; }
    #bookmarks {
      width: 260px; border-right: 1px solid #ddd;
      overflow-y: auto; font-size: 14px;
    }
    #bookmarks ul { 
      list-style: none; 
      padding: 0; 
      margin: 0; 
      padding-left: 0; 
    }
    #bookmarks li {
      padding: 8px 10px; cursor: pointer;
      border-bottom: 1px solid #eee; user-select: none;
      position: relative;
    }
    #bookmarks li.expandable { 
      font-weight: 600; 
      background: #fafafa; 
      padding-left: 10px;
    }
    #bookmarks li.expandable::before {
      content: '▶ ';
      display: inline-block;
      width: 12px;
      margin-right: 4px;
      font-size: 10px;
    }
    #bookmarks li.expandable.open::before {
      content: '▼ ';
    }
    #bookmarks ul.level-2 { padding-left: 20px; }
    #bookmarks ul.level-3 { padding-left: 40px; }
    #bookmarks ul.sub { display: none; }
    #bookmarks ul.sub.open { display: block; }
    #bookmarks li:hover { background: #f0f0f0; }
    #bookmarks li.leaf {
      padding-left: 26px;
      font-weight: normal;
      background: transparent;
    }
    #viewer { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #viewer iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      font-size-adjust: none !important;
    }
    #status {
      padding: 6px 10px; font-size: 12px;
      background: #f5f5f5; border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>

<header>
  <strong>EPUB Reader (3 livelli TOC)</strong>
  <input type="file" id="fileInput" accept=".epub" />
  <div id="controls">
    <button id="fontMinus">A−</button>
    <button id="fontReset">A</button>
    <button id="fontPlus">A+</button>
    <span id="fontInfo">100%</span>
    <button id="prevBtn">◀ Prev</button>
    <button id="nextBtn">Next ▶</button>
  </div>
</header>

<div id="container">
  <nav id="bookmarks"><ul id="toc" class="level-1"></ul></nav>
  <div id="viewer"></div>
</div>

<div id="status">Seleziona un file EPUB…</div>

<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
<script>
let book = null;
let rendition = null;
let fontSize = 100;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Funzione per aggiornare l'indicatore del font size
function updateFontInfo() {
  document.getElementById('fontInfo').textContent = fontSize + '%';
}

// Funzione migliorata per applicare il font-size
function applyTheme() {
  if (!rendition) return;
  
  try {
    // Aggiorna l'indicatore
    updateFontInfo();
    
    // Metodo 1: Override standard
    rendition.themes.override('font-size', fontSize + '%');
    
    // Metodo 2: Tema custom con !important
    rendition.themes.register('custom-font', {
      '*': {
        'font-size': `${fontSize}% !important`
      }
    });
    
    rendition.themes.select('custom-font');
    
    // Metodo 3: Inietta CSS direttamente nei contenuti
    const contents = rendition.getContents();
    if (contents && contents.length > 0) {
      contents.forEach(content => {
        try {
          const doc = content.document;
          const styleId = 'epub-reader-font-size-override';
          let style = doc.getElementById(styleId);
          
          if (!style) {
            style = doc.createElement('style');
            style.id = styleId;
            doc.head.appendChild(style);
          }
          
          // CSS che forza il font-size su tutti gli elementi
          style.textContent = `
            body, body * {
              font-size: ${fontSize}% !important;
            }
            p, div, span, li, td, th, a, h1, h2, h3, h4, h5, h6 {
              font-size: ${fontSize}% !important;
            }
          `;
        } catch (e) {
          console.log('Errore iniettando CSS:', e);
        }
      });
    }
  } catch (error) {
    console.error('Errore applicando tema:', error);
  }
}

function renderBookmarksSimple(toc) {
  const container = document.getElementById('toc');
  container.innerHTML = '';
  
  toc.forEach(item => {
    const hasSub1 = item.subitems && item.subitems.length > 0;
    
    // Livello 1
    const li1 = document.createElement('li');
    li1.className = 'expandable';
    li1.textContent = item.label;
    container.appendChild(li1);
    
    if (hasSub1) {
      const ul1 = document.createElement('ul');
      ul1.className = 'sub level-2';
      container.appendChild(ul1);
      
      li1.onclick = (e) => {
        e.stopPropagation();
        li1.classList.toggle('open');
        ul1.classList.toggle('open');
      };
      
      // Livello 2
      item.subitems.forEach(sub1 => {
        const hasSub2 = sub1.subitems && sub1.subitems.length > 0;
        
        const li2 = document.createElement('li');
        if (hasSub2) {
          li2.className = 'expandable';
        } else {
          li2.className = 'leaf';
        }
        li2.textContent = sub1.label;
        ul1.appendChild(li2);
        
        if (hasSub2) {
          const ul2 = document.createElement('ul');
          ul2.className = 'sub level-3';
          ul1.appendChild(ul2);
          
          li2.onclick = (e) => {
            e.stopPropagation();
            li2.classList.toggle('open');
            ul2.classList.toggle('open');
          };
          
          // Livello 3
          sub1.subitems.forEach(sub2 => {
            const li3 = document.createElement('li');
            li3.className = 'leaf';
            li3.textContent = sub2.label;
            li3.onclick = (e) => {
              e.stopPropagation();
              if (sub2.href) {
                rendition.display(sub2.href);
              }
            };
            ul2.appendChild(li3);
          });
        } else {
          li2.onclick = (e) => {
            e.stopPropagation();
            if (sub1.href) {
              rendition.display(sub1.href);
            }
          };
        }
      });
    } else {
      li1.className = 'leaf';
      li1.onclick = (e) => {
        e.stopPropagation();
        if (item.href) {
          rendition.display(item.href);
        }
      };
    }
  });
}

window.addEventListener('DOMContentLoaded', () => {
  const fileInput = document.getElementById('fileInput');
  const viewer = document.getElementById('viewer');

  // Inizializza l'indicatore
  updateFontInfo();

  // Modifica qui: step ridotto a 5% invece di 10%
  document.getElementById('fontPlus').onclick = () => { 
    fontSize = Math.min(200, fontSize + 5); 
    applyTheme(); 
  };
  
  document.getElementById('fontMinus').onclick = () => { 
    fontSize = Math.max(50, fontSize - 5); 
    applyTheme(); 
  };
  
  document.getElementById('fontReset').onclick = () => { 
    fontSize = 100; 
    applyTheme(); 
  };

  document.getElementById('prevBtn').onclick = () => rendition && rendition.prev();
  document.getElementById('nextBtn').onclick = () => rendition && rendition.next();

  fileInput.addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    setStatus('Caricamento EPUB…');
    viewer.innerHTML = '';
    document.getElementById('toc').innerHTML = '';

    if (book) {
      try { book.destroy(); } catch (e) {}
      book = null;
      rendition = null;
    }

    try {
      const buffer = await file.arrayBuffer();
      book = ePub(buffer, {
        openAs: 'binary',
        replacements: 'base64'
      });
      await book.ready;
      await book.resources.replacements();

      rendition = book.renderTo('viewer', {
        width: '100%',
        height: '100%',
        spread: 'none',
        allowScriptedContent: true
      });

      // Hook per iniettare CSS quando il contenuto viene caricato
      rendition.hooks.content.register((contents) => {
        // Aggiungi stile per immagini
        const style = contents.document.createElement('style');
        style.textContent = `
          img {
            max-width: 100% !important;
            height: auto !important;
            width: auto !important;
            display: block;
          }
        `;
        contents.document.head.appendChild(style);
        
        // Applica il font-size corrente
        setTimeout(() => {
          applyTheme();
        }, 100);
      });

      // Applica il font-size quando la pagina viene renderizzata
      rendition.on('rendered', () => {
        setTimeout(() => {
          applyTheme();
        }, 50);
      });

      // Applica tema iniziale e mostra prima pagina
      await rendition.display();
      applyTheme();

      const navigation = await book.loaded.navigation;
      renderBookmarksSimple(navigation.toc);

      setStatus('EPUB caricato correttamente');
    } catch (err) {
      console.error(err);
      setStatus('Errore nel caricamento EPUB (vedi console)');
      alert('Errore nel caricamento EPUB');
    }
  });
});
</script>
</body>
</html>
